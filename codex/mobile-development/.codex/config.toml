# This nested project layer is loaded only when Codex runs from
# codex/mobile-development/ or a descendant in a trusted repository.
approval_policy = "on-request"
sandbox_mode = "workspace-write"

[agents]
max_threads = 4
max_depth = 1

[features]
hooks = true

[sandbox_workspace_write]
network_access = false

# Optional MCP servers. Every server is disabled and non-required by default.
# Tool allowlists are read-oriented, and every exposed call requires approval.

[mcp_servers.firebase]
command = "firebase"
args = ["mcp", "--only", "firestore,storage,crashlytics"]
enabled = false
required = false
enabled_tools = [
  "firebase_get_project",
  "firebase_list_apps",
  "firebase_get_security_rules",
  "firebase_validate_security_rules",
  "firebase_read_resources",
  "crashlytics_get_issue",
  "crashlytics_list_events",
  "crashlytics_batch_get_events",
]
default_tools_approval_mode = "prompt"
startup_timeout_sec = 20
tool_timeout_sec = 60

[mcp_servers.figma]
url = "https://mcp.figma.com/mcp"
auth = "oauth"
enabled = false
required = false
enabled_tools = [
  "get_design_context",
  "get_metadata",
  "get_screenshot",
  "get_variable_defs",
  "get_code_connect_map",
]
default_tools_approval_mode = "prompt"
startup_timeout_sec = 20
tool_timeout_sec = 60

[mcp_servers.github]
url = "https://api.githubcopilot.com/mcp/"
bearer_token_env_var = "GITHUB_PERSONAL_ACCESS_TOKEN"
enabled = false
required = false
enabled_tools = [
  "get_file_contents",
  "pull_request_read",
  "search_pull_requests",
]
default_tools_approval_mode = "prompt"
startup_timeout_sec = 20
tool_timeout_sec = 60

[mcp_servers.sentry]
url = "https://mcp.sentry.dev/mcp"
auth = "oauth"
enabled = false
required = false
enabled_tools = [
  "find_organizations",
  "find_projects",
  "search_issues",
  "get_issue_details",
  "search_events",
  "get_trace_details",
]
default_tools_approval_mode = "prompt"
startup_timeout_sec = 20
tool_timeout_sec = 60
