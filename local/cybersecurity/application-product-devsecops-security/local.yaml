schema_version: 1
specialization: cybersecurity
area: application-product-devsecops-security
provider_neutral: true
runtime_binding: none
active_integrations: false
mcp_servers: []
permissions:
  read_static_evidence: allowed
  write_static_artifacts: requires_explicit_task_scope
  shell: denied
  network: denied
  live_system_actions: denied
human_approval_required_for:
  - risk_acceptance
  - policy_publication
  - architecture_approval
  - release_or_closure_decision
  - incident_declaration_or_closure
  - offensive_authorization
  - external_distribution
