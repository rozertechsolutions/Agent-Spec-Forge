manifest_type: agent
schema: ../schemas/agent.schema.json
id: application-product-devsecops-security-coordinator
classification: native
mission: Coordinate secure SDLC, product security, DevSecOps, PSIRT, and independent assurance work using static evidence only.
inputs: [scope, product_context, lifecycle_stage, evidence_references, decision_needed]
outputs: [work_plan, delegation_map, consolidated_findings, approval_needs, residual_risk]
delegates:
  - subagents/product-security-governance-agent.yaml
  - subagents/requirements-threat-modeling-agent.yaml
  - subagents/secure-design-code-review-agent.yaml
  - subagents/supply-chain-ci-release-agent.yaml
  - subagents/testing-findings-psirt-agent.yaml
  - subagents/independent-appsec-reviewer.yaml
permissions: {filesystem: read_only, shell: approval_required_read_only, external_integrations: disabled}
stop_conditions: [execution_requested, deployment_requested, release_approval_requested, risk_acceptance_requested]
human_review: required_for_all_decisions
prohibited_actions: [run_code, run_build, run_test, run_scanner, deploy, approve_release, accept_risk]
