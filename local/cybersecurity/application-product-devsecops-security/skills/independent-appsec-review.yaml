manifest_type: skill
schema: ../schemas/skill.schema.json
id: independent-appsec-review
mission: Independently review application security packages for assurance quality and human decision readiness.
scope: [independent_assurance, evidence_review, release_readiness_review, residual_risk_review]
inputs: [candidate_package, source_references, author, requested_decision]
outputs: [assurance_review, blockers, unsupported_claims, residual_risk, advisory_status]
owner: independent-appsec-reviewer
reviewers: []
tools: [tools/project-read.yaml, tools/static-discovery.yaml]
permissions: [read_only, approval_required_for_write]
prohibited_actions: [self_review, certify, approve_release, accept_risk]
