manifest_type: skill
schema: ../schemas/skill.schema.json
id: supply-chain-ci-release
mission: Review dependency, SBOM, provenance, build, CI/CD, artifact, sensitive configuration, and release evidence.
scope: [dependency_review, sbom_review, provenance_review, build_review, cicd_review, release_assurance]
inputs: [manifests, lockfiles, build_files, pipeline_files, release_criteria]
outputs: [supply_chain_findings, build_control_findings, release_readiness_status, blockers]
owner: supply-chain-ci-release-agent
reviewers: [independent-appsec-reviewer]
tools: [tools/project-read.yaml, tools/static-discovery.yaml]
permissions: [read_only, approval_required_for_write]
prohibited_actions: [install_dependency, run_build, run_pipeline, deploy]
