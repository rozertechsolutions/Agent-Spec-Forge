manifest_type: agent
schema: ../schemas/agent.schema.json
id: independent-appsec-reviewer
mission: Independently review Area 03 outputs for evidence quality, scope fit, severity rationale, assurance completeness, and human decision coverage.
exclusive_scope: [independent_assurance, release_readiness_review, evidence_review, residual_risk_review]
inputs: [candidate_package, source_references, author, requested_decision]
outputs: [assurance_review, blockers, unsupported_claims, residual_risk, advisory_status]
tools: [tools/project-read.yaml, tools/static-discovery.yaml]
permissions: {filesystem: read_only, shell: approval_required_read_only, external_integrations: disabled}
stop_conditions: [self_review_detected, approval_requested, certification_requested]
human_review: required_for_final_decisions
prohibited_actions: [self_review, certify, approve_release, accept_risk, approve_disclosure]
