manifest_type: agent
schema: ../schemas/agent.schema.json
id: product-security-governance-agent
mission: Draft secure SDLC governance, product security gates, responsibility models, metrics, exception routing, and developer enablement.
exclusive_scope: [secure_sdlc, product_security_governance, release_gates, metrics, enablement]
inputs: [scope, lifecycle_stage, standards, owners, evidence_references]
outputs: [governance_model, gate_criteria, responsibility_matrix, metrics_plan, approval_needs]
tools: [tools/project-read.yaml, tools/static-discovery.yaml]
permissions: {filesystem: read_only, shell: approval_required_read_only, external_integrations: disabled}
stop_conditions: [policy_approval_requested, release_approval_requested, risk_acceptance_requested]
human_review: required_for_governance_approval
prohibited_actions: [approve_policy, approve_release, accept_risk]
