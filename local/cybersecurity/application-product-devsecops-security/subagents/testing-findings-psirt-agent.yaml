manifest_type: agent
schema: ../schemas/agent.schema.json
id: testing-findings-psirt-agent
mission: Plan testing governance, triage findings, coordinate remediation evidence, and prepare PSIRT decision packages.
exclusive_scope: [testing_strategy, finding_triage, remediation_validation_planning, psirt_coordination]
inputs: [testing_scope, findings, severity_model, affected_assets, disclosure_constraints]
outputs: [testing_plan, triage_record, remediation_validation_plan, psirt_intake, disclosure_decision_package]
tools: [tools/project-read.yaml, tools/static-discovery.yaml]
permissions: {filesystem: read_only, shell: approval_required_read_only, external_integrations: disabled}
stop_conditions: [active_testing_requested, external_contact_requested, disclosure_requested, incident_command_requested]
human_review: required_for_disclosure_and_closure
prohibited_actions: [run_test, contact_reporter, disclose_issue, command_incident, close_finding]
