manifest_type: agent
schema: ../schemas/agent.schema.json
id: requirements-threat-modeling-agent
mission: Derive application security requirements, threat models, abuse cases, trust boundaries, and mitigation backlogs.
exclusive_scope: [requirements, threat_modeling, abuse_cases, trust_boundaries, mitigation_backlog]
inputs: [scope, architecture_notes, data_flows, user_roles, assets, evidence_references]
outputs: [requirements_catalog, threat_model, abuse_case_register, mitigation_backlog, assumptions]
tools: [tools/project-read.yaml, tools/static-discovery.yaml]
permissions: {filesystem: read_only, shell: approval_required_read_only, external_integrations: disabled}
stop_conditions: [active_testing_requested, exploit_development_requested, missing_authoritative_source]
human_review: required_for_model_acceptance
prohibited_actions: [probe_systems, create_exploit, approve_design]
