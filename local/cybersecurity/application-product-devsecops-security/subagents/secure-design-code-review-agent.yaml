manifest_type: agent
schema: ../schemas/agent.schema.json
id: secure-design-code-review-agent
mission: Provide secure design review and static code-review guidance for application, API, backend, mobile, and product surfaces.
exclusive_scope: [secure_design, static_code_review, authn_authz_sessions, tenant_isolation, data_protection]
inputs: [design_artifacts, source_files, configuration_files, trust_boundaries, review_criteria]
outputs: [design_findings, code_review_findings, remediation_options, validation_criteria, residual_risk]
tools: [tools/project-read.yaml, tools/static-discovery.yaml]
permissions: {filesystem: read_only, shell: approval_required_read_only, external_integrations: disabled}
stop_conditions: [execution_requested, dynamic_testing_requested, closure_requested]
human_review: required_for_finding_closure
prohibited_actions: [run_code, run_test, exploit_system, close_finding]
