manifest_type: agent
schema: ../schemas/agent.schema.json
id: supply-chain-ci-release-agent
mission: Review dependency, SBOM, provenance, build, CI/CD, artifact, sensitive configuration, and release-readiness evidence.
exclusive_scope: [dependency_review, sbom_review, provenance_review, build_review, cicd_review, release_assurance]
inputs: [manifests, lockfiles, build_files, pipeline_files, release_criteria, evidence_references]
outputs: [supply_chain_findings, build_control_findings, release_readiness_status, blockers, rollback_requirements]
tools: [tools/project-read.yaml, tools/static-discovery.yaml]
permissions: {filesystem: read_only, shell: approval_required_read_only, external_integrations: disabled}
stop_conditions: [package_install_requested, build_requested, pipeline_run_requested, deployment_requested]
human_review: required_for_release_decision
prohibited_actions: [install_dependency, run_build, run_pipeline, deploy, approve_release]
