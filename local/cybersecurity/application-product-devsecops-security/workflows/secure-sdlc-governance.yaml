manifest_type: workflow
schema: ../schemas/workflow.schema.json
id: secure-sdlc-governance
purpose: Create traceable secure SDLC governance and product security gate artifacts.
owner: product-security-governance-agent
skills: [skills/secure-sdlc-governance.yaml, skills/independent-appsec-review.yaml]
steps: [confirm_scope_and_sources, map_lifecycle_controls, draft_gate_criteria, list_human_decisions, request_independent_review]
outputs: [governance_model, gate_criteria, responsibility_matrix, metrics_plan, reviewer_findings]
completion_criteria: [sources_listed, assumptions_flagged, approval_needs_listed, independent_review_complete_or_required]
human_review: [governance_approval, release_gate_acceptance]
prohibited_actions: [approve_policy, approve_release, accept_risk]
