manifest_type: workflow
schema: ../schemas/workflow.schema.json
id: testing-findings-psirt
purpose: Plan testing governance, triage findings, and prepare PSIRT coordination packages.
owner: testing-findings-psirt-agent
skills: [skills/testing-findings-psirt.yaml, skills/independent-appsec-review.yaml]
steps: [confirm_testing_scope, triage_findings, define_validation_plan, draft_psirt_package, request_independent_review]
outputs: [testing_plan, triage_record, remediation_validation_plan, psirt_intake, reviewer_findings]
completion_criteria: [severity_rationale_recorded, disclosure_decisions_listed, closure_requires_human]
human_review: [disclosure_decision, finding_closure]
prohibited_actions: [run_test, disclose_issue, command_incident, close_finding]
