manifest_type: workflow
schema: ../schemas/workflow.schema.json
id: supply-chain-ci-release
purpose: Review dependency, build, CI/CD, artifact, and release-readiness controls.
owner: supply-chain-ci-release-agent
skills: [skills/supply-chain-ci-release.yaml, skills/independent-appsec-review.yaml]
steps: [inventory_static_files, review_dependency_and_sbom_evidence, review_build_and_pipeline_controls, define_release_blockers, request_independent_review]
outputs: [supply_chain_findings, build_control_findings, release_readiness_status, blockers, reviewer_findings]
completion_criteria: [release_conditions_listed, unavailable_evidence_recorded, human_release_decision_required]
human_review: [release_approval, exception_approval]
prohibited_actions: [install_dependency, run_build, run_pipeline, deploy]
