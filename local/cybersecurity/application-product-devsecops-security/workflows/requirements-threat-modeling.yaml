manifest_type: workflow
schema: ../schemas/workflow.schema.json
id: requirements-threat-modeling
purpose: Build application security requirements, threat models, abuse cases, and mitigation backlogs.
owner: requirements-threat-modeling-agent
skills: [skills/requirements-threat-modeling.yaml, skills/independent-appsec-review.yaml]
steps: [confirm_assets_and_roles, map_data_flows_and_trust_boundaries, identify_abuse_cases, define_mitigations, request_independent_review]
outputs: [requirements_catalog, threat_model, abuse_case_register, mitigation_backlog, reviewer_findings]
completion_criteria: [scope_confirmed, assumptions_flagged, mitigations_mapped, human_decisions_listed]
human_review: [threat_model_acceptance, mitigation_prioritization]
prohibited_actions: [probe_systems, create_exploit, approve_design]
