manifest_type: skill
schema: ../schemas/skill.schema.json
id: independent-architecture-review
classification: native
mission: Independently review architecture artifacts for evidence support, scope fit, missing decisions, unsupported claims, and residual risk.
scope: [independent_review, evidence_quality, claim_validation, residual_risk, approval_readiness]
inputs: [draft_artifact, evidence_references, assumptions, scope, acceptance_criteria]
outputs: [severity_ordered_findings, evidence_gaps, residual_risk_notes, approval_requirements, readiness_recommendation]
owner: independent-architecture-reviewer
reviewers: []
tools: [tools/project-read.yaml, tools/static-discovery.yaml]
permissions: [read_only, approval_required_for_write]
stop_conditions: [self_review_detected, approval_requested_from_reviewer, insufficient_evidence]
prohibited_actions: [approve_architecture, accept_risk, close_findings, self_review]

