manifest_type: skill
schema: ../schemas/skill.schema.json
id: enterprise-solution-patterns
classification: native
mission: Review enterprise, solution, platform, endpoint, and workspace designs for secure reusable architecture patterns.
scope: [enterprise_architecture, solution_architecture, platform_security, endpoint_workspace, pattern_mapping]
inputs: [architecture_assets, requirements, trust_boundaries, data_flows, known_constraints]
outputs: [design_review, pattern_map, gap_register, decision_package]
owner: enterprise-solution-architecture-agent
reviewers: [independent-architecture-reviewer]
tools: [tools/project-read.yaml, tools/static-discovery.yaml]
permissions: [read_only, approval_required_for_write]
stop_conditions: [production_change_requested, missing_asset_context, product_delivery_requested]
prohibited_actions: [deploy_changes, operate_controls, approve_architecture]

