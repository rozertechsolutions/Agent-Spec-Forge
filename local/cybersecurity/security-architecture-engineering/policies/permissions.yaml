manifest_type: policy
schema: ../schemas/policy.schema.json
id: permissions
classification: native
default_permissions:
  filesystem: read_only
  shell: approval_required_read_only
  network: disabled
  external_integrations: disabled
  writes: approval_required
requirements:
  - least_privilege
  - no_silent_external_actions
  - no_production_changes
  - no_control_activation
  - preserve_user_changes
fail_safe_behavior: stop_and_request_human_review

