manifest_type: policy
schema: ../schemas/policy.schema.json
id: evidence-handling
classification: native
requirements:
  - cite_source_files_or_authoritative_references
  - label_assumptions
  - label_unavailable_context
  - preserve_evidence_integrity
  - minimize_sensitive_content
  - record_human_decisions_separately
prohibited_actions:
  - fabricate_evidence
  - alter_source_evidence
  - conceal_limitations
  - represent_draft_as_approved
fail_safe_behavior: stop_and_request_human_review

