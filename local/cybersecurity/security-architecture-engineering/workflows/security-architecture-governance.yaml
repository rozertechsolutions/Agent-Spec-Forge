manifest_type: workflow
schema: ../schemas/workflow.schema.json
id: security-architecture-governance
classification: native
purpose: Create traceable security architecture governance, reference, standards, and decision artifacts.
owner: architecture-governance-agent
skills: [skills/security-architecture-governance.yaml, skills/independent-architecture-review.yaml]
steps:
  - confirm_scope_and_authoritative_sources
  - map_architecture_principles_to_controls
  - draft_reference_and_decision_records
  - list_human_decisions_and_approval_needs
  - request_independent_architecture_review
outputs: [governance_model, reference_index, decision_record, mapping_table, reviewer_findings]
completion_criteria: [sources_listed, assumptions_flagged, approval_needs_listed, independent_review_complete_or_required]
human_review: [governance_approval, architecture_acceptance, external_distribution]
prohibited_actions: [approve_policy, accept_risk, certify_architecture]

