manifest_type: workflow
schema: ../schemas/workflow.schema.json
id: enterprise-solution-patterns
classification: native
purpose: Review enterprise, solution, platform, endpoint, and workspace designs for secure reusable patterns.
owner: enterprise-solution-architecture-agent
skills: [skills/enterprise-solution-patterns.yaml, skills/independent-architecture-review.yaml]
steps:
  - inventory_assets_and_trust_boundaries
  - map_requirements_to_control_patterns
  - document_design_tradeoffs_and_dependencies
  - prepare_decision_package
  - request_independent_architecture_review
outputs: [design_review, pattern_map, gap_register, decision_package, reviewer_findings]
completion_criteria: [assets_mapped, dependencies_recorded, residual_risk_documented, independent_review_complete_or_required]
human_review: [architecture_acceptance, production_use, external_distribution]
prohibited_actions: [deploy_changes, operate_controls, approve_architecture]

