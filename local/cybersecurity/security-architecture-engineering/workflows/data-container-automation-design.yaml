manifest_type: workflow
schema: ../schemas/workflow.schema.json
id: data-container-automation-design
classification: native
purpose: Draft data protection, cryptography, container, Kubernetes, IaC, and automation architecture patterns.
owner: data-container-automation-agent
skills: [skills/data-container-automation-design.yaml, skills/independent-architecture-review.yaml]
steps:
  - classify_data_and_architecture_assets
  - map_cryptography_and_key_handling_patterns
  - review_container_kubernetes_and_iac_boundaries
  - design_security_automation_with_human_gates
  - request_independent_architecture_review
outputs: [data_pattern, cryptography_notes, orchestration_review, iac_guardrail_map, automation_package, reviewer_findings]
completion_criteria: [data_flows_classified, orchestration_boundaries_reviewed, automation_approval_path_defined, independent_review_complete_or_required]
human_review: [production_use, control_activation, environment_changes]
prohibited_actions: [generate_live_auth_values, rotate_keys, deploy_iac, operate_clusters]

