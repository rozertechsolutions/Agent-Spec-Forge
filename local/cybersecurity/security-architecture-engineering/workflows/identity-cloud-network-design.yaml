manifest_type: workflow
schema: ../schemas/workflow.schema.json
id: identity-cloud-network-design
classification: native
purpose: Draft identity, privileged access, cloud, platform, network, and communications security target state.
owner: identity-cloud-network-agent
skills: [skills/identity-cloud-network-design.yaml, skills/independent-architecture-review.yaml]
steps:
  - confirm_environment_scope
  - map_administration_paths_and_connectivity
  - design_target_state_control_patterns
  - document_dependencies_and_human_decisions
  - request_independent_architecture_review
outputs: [target_state_design, segmentation_review, privilege_notes, dependency_log, reviewer_findings]
completion_criteria: [administration_paths_reviewed, network_paths_documented, cloud_boundaries_mapped, independent_review_complete_or_required]
human_review: [design_acceptance, access_changes, environment_changes]
prohibited_actions: [grant_access, change_configuration, operate_network_controls]

