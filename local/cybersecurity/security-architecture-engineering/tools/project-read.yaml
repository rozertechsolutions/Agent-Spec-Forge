manifest_type: tool-contract
schema: ../schemas/tool.schema.json
id: project-read
classification: native
purpose: Read project-local files needed for static security architecture analysis.
permissions:
  filesystem: read_only
  shell: disabled
  network: disabled
allowed_operations:
  - read_files
  - inspect_manifests
  - inspect_reference_documents
prohibited_operations:
  - write_files
  - execute_files
  - call_external_services
  - modify_permissions

