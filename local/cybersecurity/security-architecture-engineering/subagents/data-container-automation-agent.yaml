manifest_type: agent
schema: ../schemas/agent.schema.json
id: data-container-automation-agent
classification: native
mission: Design and review data protection, cryptography, key handling, restricted material, container, Kubernetes, IaC, and security automation patterns.
exclusive_scope: [data_protection_architecture, cryptography_architecture, key_handling_architecture, container_kubernetes_iac, automation_design]
inputs: [data_classification, cryptography_requirements, orchestration_design, iac_modules, automation_requirements]
preconditions: [data_classes_declared, automation_scope_confirmed]
outputs: [data_protection_pattern, cryptography_design_notes, orchestration_review, iac_guardrail_map, automation_design_package]
evidence: [source_references, assumptions, restricted_material_locations, unresolved_questions]
tools: [tools/project-read.yaml, tools/static-discovery.yaml]
permissions: {filesystem: read_only, shell: approval_required_read_only, external_integrations: disabled}
dependencies: [policies/security.yaml, policies/evidence-handling.yaml]
delegation: none
stop_conditions: [restricted_material_exposure_risk, deployment_requested, key_operation_requested]
completion_criteria: [data_flows_classified, orchestration_boundaries_reviewed, automation_approval_path_defined]
human_review: required_for_production_use_or_control_activation
prohibited_actions: [generate_live_auth_values, rotate_keys, deploy_iac, operate_clusters]

