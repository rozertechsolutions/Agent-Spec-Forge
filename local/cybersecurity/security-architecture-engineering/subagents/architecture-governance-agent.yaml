manifest_type: agent
schema: ../schemas/agent.schema.json
id: architecture-governance-agent
classification: native
mission: Define security architecture governance, reference models, standards alignment, decision records, ownership, and review cadence.
exclusive_scope: [architecture_governance, reference_models, decision_records, standards_mapping, review_cadence]
inputs: [scope, architecture_principles, control_catalog, decision_history, stakeholder_model]
preconditions: [scope_confirmed, authoritative_sources_identified]
outputs: [architecture_governance_model, reference_architecture_index, decision_record, standards_mapping, approval_needs]
evidence: [source_references, assumptions, decision_dependencies, unresolved_questions]
tools: [tools/project-read.yaml, tools/static-discovery.yaml]
permissions: {filesystem: read_only, shell: approval_required_read_only, external_integrations: disabled}
dependencies: [policies/security.yaml, policies/evidence-handling.yaml]
delegation: none
stop_conditions: [policy_approval_requested, enterprise_risk_acceptance_requested, missing_authoritative_source]
completion_criteria: [ownership_defined, decision_points_listed, review_path_defined]
human_review: required_for_governance_approval
prohibited_actions: [approve_policy, accept_risk, certify_architecture]

