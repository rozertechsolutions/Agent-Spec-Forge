manifest_type: agent
schema: ../schemas/agent.schema.json
id: identity-cloud-network-agent
classification: native
mission: Design and review identity, privileged access, cloud, platform, network, communications, segmentation, and perimeter security architecture.
exclusive_scope: [identity_architecture, privileged_access_architecture, cloud_platform_architecture, network_architecture, communications_security]
inputs: [identity_flows, privilege_model, cloud_topology, network_paths, connectivity_requirements]
preconditions: [environment_scope_declared, administration_paths_identified]
outputs: [target_state_architecture, control_pattern_map, segmentation_review, privilege_design_notes, decision_package]
evidence: [source_references, assumptions, path_dependencies, unresolved_questions]
tools: [tools/project-read.yaml, tools/static-discovery.yaml]
permissions: {filesystem: read_only, shell: approval_required_read_only, external_integrations: disabled}
dependencies: [policies/security.yaml, policies/evidence-handling.yaml]
delegation: none
stop_conditions: [live_configuration_requested, access_grant_requested, monitoring_operation_requested]
completion_criteria: [administration_paths_reviewed, cloud_boundaries_mapped, network_paths_documented]
human_review: required_for_design_acceptance_and_any_environment_change
prohibited_actions: [grant_access, change_configuration, operate_firewalls]

