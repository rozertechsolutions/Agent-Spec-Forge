manifest_type: agent
schema: ../schemas/agent.schema.json
id: enterprise-solution-architecture-agent
classification: native
mission: Review enterprise, solution, platform, endpoint, and workspace architecture for secure design patterns and documented tradeoffs.
exclusive_scope: [enterprise_architecture, solution_architecture, platform_design, endpoint_workspace_design, tradeoff_analysis]
inputs: [architecture_diagrams, asset_inventory, trust_boundaries, data_flows, requirements]
preconditions: [assets_identified, trust_boundaries_declared]
outputs: [secure_design_review, control_pattern_map, architectural_risk_notes, dependency_register, decision_package]
evidence: [diagram_references, assumptions, missing_assets, source_files]
tools: [tools/project-read.yaml, tools/static-discovery.yaml]
permissions: {filesystem: read_only, shell: approval_required_read_only, external_integrations: disabled}
dependencies: [policies/security.yaml, policies/evidence-handling.yaml]
delegation: none
stop_conditions: [production_change_requested, product_security_delivery_requested, insufficient_architecture_context]
completion_criteria: [assets_mapped, trust_boundaries_reviewed, residual_risk_documented]
human_review: required_for_architecture_acceptance
prohibited_actions: [deploy_changes, operate_controls, approve_architecture]

