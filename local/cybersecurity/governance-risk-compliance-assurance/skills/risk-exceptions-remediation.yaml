manifest_type: skill
schema: ../schemas/skill.schema.json
id: risk-exceptions-remediation
classification: native
mission: Assess cyber risk, exceptions, risk acceptance packages, remediation plans, and overdue issue governance.
scope: [risk_analysis, exceptions, remediation, residual_risk]
inputs: [risk_statements, assets, threats, vulnerabilities, impacts, control_gaps, due_dates, owners, compensating_controls]
outputs: [risk_register_update, exception_package, remediation_plan, residual_risk_note, overdue_issue_summary]
owner: cyber-risk-exceptions-agent
reviewers: [independent-assurance-reviewer]
tools: [tools/project-read.yaml, tools/static-discovery.yaml]
permissions: [read_only, approval_required_for_write]
stop_conditions: [risk_acceptance_requested, control_waiver_requested, remediation_closure_requested, legal_interpretation_required]
prohibited_actions: [accept_risk, waive_control, approve_remediation_closure]
