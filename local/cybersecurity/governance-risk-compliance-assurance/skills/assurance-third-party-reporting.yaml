manifest_type: skill
schema: ../schemas/skill.schema.json
id: assurance-third-party-reporting
classification: native
mission: Prepare control assurance, audit evidence requests, third-party risk summaries, maturity reporting, and remediation status packs.
scope: [assurance, audit_evidence, third_party_risk, maturity_reporting, remediation_status]
inputs: [control_scope, evidence_inventory, vendor_data, issue_register, audit_requests, maturity_criteria, reporting_period, audience]
outputs: [evidence_request_list, assurance_status, vendor_risk_summary, maturity_score_rationale, remediation_dashboard_narrative]
owner: assurance-evidence-remediation-agent
reviewers: [independent-assurance-reviewer]
tools: [tools/project-read.yaml, tools/static-discovery.yaml]
permissions: [read_only, approval_required_for_write]
stop_conditions: [audit_signoff_requested, vendor_approval_requested, compliance_certification_requested, unsupported_maturity_claim]
prohibited_actions: [certify_effectiveness, approve_vendor, distribute_external_reports]
