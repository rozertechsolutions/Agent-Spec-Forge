manifest_type: skill
schema: ../schemas/skill.schema.json
id: independent-assurance-review
classification: native
mission: Perform independent read-only review of cybersecurity GRC artifacts, evidence, claims, risks, exceptions, and remediation packages.
scope: [independent_review, evidence_quality, claim_validation, approval_gap_detection]
inputs: [draft_artifact, source_evidence, assumptions, scope, acceptance_criteria, prior_findings]
outputs: [severity_ordered_findings, evidence_gaps, residual_risk, approval_requirements, readiness_recommendation]
owner: independent-assurance-reviewer
reviewers: [human_accountable_owner]
tools: [tools/project-read.yaml, tools/static-discovery.yaml]
permissions: [read_only]
stop_conditions: [self_review_detected, evidence_unavailable_without_gap_label, legal_interpretation_required, approval_requested_from_reviewer]
prohibited_actions: [modify_files_by_default, approve_risk, certify_compliance, close_findings]
