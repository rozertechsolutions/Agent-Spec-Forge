manifest_type: tool-contract
schema: ../schemas/tool.schema.json
id: project-read
classification: native
purpose: Read local project files and supplied artifacts for static analysis.
permissions:
  filesystem: read_only
  shell: none
  network: disabled
allowed_operations:
  - inspect_files
  - search_text
  - list_paths
prohibited_operations:
  - modify_files
  - execute_generated_files
  - authenticate_external_services
  - transmit_data
