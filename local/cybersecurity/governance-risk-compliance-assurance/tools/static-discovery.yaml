manifest_type: tool-contract
schema: ../schemas/tool.schema.json
id: static-discovery
classification: native
purpose: Perform safe static discovery of paths, manifests, and source references.
permissions:
  filesystem: read_only
  shell: approval_required_read_only
  network: disabled
allowed_operations:
  - list_paths
  - inspect_manifests
  - search_text
prohibited_operations:
  - build
  - test
  - start_server
  - run_generated_files
  - write_external_systems
