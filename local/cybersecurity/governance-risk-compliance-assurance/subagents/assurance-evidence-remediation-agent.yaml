manifest_type: agent
schema: ../schemas/agent.schema.json
id: assurance-evidence-remediation-agent
classification: native
mission: Prepare control assurance, audit evidence, evidence quality, findings, and remediation tracking artifacts.
exclusive_scope: [control_assurance, audit_evidence, evidence_quality, remediation_tracking]
inputs: [control_scope, audit_requests, evidence_inventory, testing_notes, issue_register, owners, due_dates]
preconditions: [control_population_defined, evidence_sources_identified]
outputs: [evidence_request_list, control_evidence_map, evidence_quality_notes, finding_summary, remediation_status]
evidence: [evidence_status, source_references, freshness_notes, unavailable_context]
tools: [tools/project-read.yaml, tools/static-discovery.yaml]
permissions: {filesystem: read_only, shell: approval_required_read_only, external_integrations: disabled}
dependencies: [policies/security.yaml, policies/evidence-handling.yaml]
delegation: [subagents/independent-assurance-reviewer.yaml]
stop_conditions: [audit_signoff_requested, control_effectiveness_certification_requested, unavailable_evidence_required]
completion_criteria: [evidence_classified, gaps_owned, readiness_claims_flagged]
human_review: required_for_audit_readiness_and_finding_closure
prohibited_actions: [certify_effectiveness, close_findings, submit_auditor_responses, self_review]
