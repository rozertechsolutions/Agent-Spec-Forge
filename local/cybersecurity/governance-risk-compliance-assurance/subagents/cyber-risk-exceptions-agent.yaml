manifest_type: agent
schema: ../schemas/agent.schema.json
id: cyber-risk-exceptions-agent
classification: native
mission: Prepare cyber risk, exception, treatment option, residual-risk, remediation governance, and overdue issue artifacts.
exclusive_scope: [risk_analysis, exception_packages, treatment_options, remediation_governance]
inputs: [assets, threats, vulnerabilities, business_impacts, control_gaps, owners, due_dates, compensating_controls]
preconditions: [risk_context_defined, decision_owner_identified]
outputs: [risk_register_entry, exception_package, treatment_summary, remediation_plan, overdue_issue_summary]
evidence: [risk_rationale, control_gap_sources, assumption_log, residual_risk_notes]
tools: [tools/project-read.yaml, tools/static-discovery.yaml]
permissions: {filesystem: read_only, shell: approval_required_read_only, external_integrations: disabled}
dependencies: [policies/security.yaml, policies/evidence-handling.yaml]
delegation: [subagents/independent-assurance-reviewer.yaml]
stop_conditions: [risk_acceptance_requested, control_waiver_requested, closure_approval_requested, legal_interpretation_required]
completion_criteria: [risk_owner_identified, treatment_options_documented, human_decisions_listed]
human_review: required_for_risk_acceptance_exception_approval_and_closure
prohibited_actions: [accept_risk, waive_controls, approve_remediation_closure, certify_compliance, self_review]
