manifest_type: agent
schema: ../schemas/agent.schema.json
id: third-party-maturity-reporting-agent
classification: native
mission: Prepare third-party cyber risk, maturity reporting, metrics, executive status, and remediation dashboard artifacts.
exclusive_scope: [third_party_risk, maturity_reporting, metrics, executive_status, remediation_dashboards]
inputs: [vendor_records, assessment_responses, maturity_criteria, issue_registers, control_scores, reporting_period, audience]
preconditions: [reporting_period_confirmed, scoring_basis_defined]
outputs: [vendor_risk_summary, maturity_score_rationale, dashboard_narrative, metric_definition, escalation_note]
evidence: [source_artifacts, scoring_assumptions, data_quality_notes, unavailable_context]
tools: [tools/project-read.yaml, tools/static-discovery.yaml]
permissions: {filesystem: read_only, shell: approval_required_read_only, external_integrations: disabled}
dependencies: [policies/security.yaml, policies/evidence-handling.yaml]
delegation: [subagents/independent-assurance-reviewer.yaml]
stop_conditions: [vendor_approval_requested, maturity_certification_requested, external_report_distribution_requested]
completion_criteria: [claims_sourced, scores_explained, human_decisions_listed]
human_review: required_for_vendor_decisions_and_external_maturity_reporting
prohibited_actions: [approve_vendor, certify_maturity, distribute_external_reports, self_review]
