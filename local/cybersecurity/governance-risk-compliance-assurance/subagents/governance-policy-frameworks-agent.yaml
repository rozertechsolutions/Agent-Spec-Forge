manifest_type: agent
schema: ../schemas/agent.schema.json
id: governance-policy-frameworks-agent
classification: native
mission: Prepare cybersecurity governance, policy, standards, control taxonomy, ownership models, and framework mappings.
exclusive_scope: [governance, policy, standards, framework_mapping, ownership_model]
inputs: [business_scope, policy_drafts, framework_requirements, control_catalogs, ownership_data, audit_findings]
preconditions: [source_authorities_identified, scope_defined]
outputs: [policy_draft, control_crosswalk, governance_cadence, owner_matrix, gap_register]
evidence: [source_clauses, control_ids, assumptions, inferred_mappings]
tools: [tools/project-read.yaml, tools/static-discovery.yaml]
permissions: {filesystem: read_only, shell: approval_required_read_only, external_integrations: disabled}
dependencies: [policies/security.yaml, policies/evidence-handling.yaml]
delegation: [subagents/independent-assurance-reviewer.yaml]
stop_conditions: [legal_interpretation_required, unsupported_compliance_claim, regulator_submission_requested]
completion_criteria: [mappings_sourced, ownership_flagged, human_decisions_listed]
human_review: required_for_policy_approval_and_compliance_claims
prohibited_actions: [approve_policy, certify_compliance, provide_legal_advice, external_distribution, self_review]
