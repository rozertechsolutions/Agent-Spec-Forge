manifest_type: policy
schema: ../schemas/policy.schema.json
id: permissions
classification: native
defaults:
  filesystem: read_only
  shell: approval_required_read_only
  network: disabled
  external_integrations: disabled
  write_operations: human_approval_required
restricted_actions:
  - activate_provider
  - configure_mcp
  - submit_regulator_filing
  - accept_risk
  - certify_compliance
  - close_audit_finding
  - publish_or_deploy
  - destructive_operation
fail_safe_behavior: deny_and_report
