manifest_type: policy
schema: ../schemas/policy.schema.json
id: security
classification: native
protected_material:
  - secrets
  - credentials
  - private_keys
  - local_environment_files
  - customer_data
  - employee_data
  - audit_evidence
  - vendor_contracts
  - vulnerability_data
  - regulator_communications
requirements:
  - separate_evidence_from_assumptions
  - require_human_approval_for_sensitive_claims
  - do_not_fabricate_control_evidence
  - do_not_expose_protected_material
fail_safe_behavior: stop_and_request_human_review
