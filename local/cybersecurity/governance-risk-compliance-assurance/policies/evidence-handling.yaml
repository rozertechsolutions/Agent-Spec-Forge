manifest_type: policy
schema: ../schemas/policy.schema.json
id: evidence-handling
classification: native
evidence_states:
  - supplied
  - unavailable
  - stale
  - inferred
  - not_applicable
rules:
  - every_claim_requires_evidence_or_assumption_label
  - every_mapping_requires_source_and_owner_when_available
  - every_gap_requires_impact_owner_and_decision_point_when_available
  - unavailable_evidence_must_not_be_treated_as_passed
human_review_required_for:
  - compliance_claim
  - audit_readiness_claim
  - control_effectiveness_claim
  - external_distribution
  - risk_acceptance
