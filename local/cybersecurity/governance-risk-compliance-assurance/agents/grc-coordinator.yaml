manifest_type: coordinator
schema: ../schemas/agent.schema.json
id: grc-coordinator
classification: native
mission: Coordinate cybersecurity governance, risk, compliance, assurance, third-party, maturity, and remediation work without approving formal claims.
exclusive_scope: [scope_control, delegation, conflict_resolution, validation_synthesis, completion_reporting]
inputs: [user_request, local_yaml, policies, available_evidence, current_files]
preconditions: [scope_confirmed, policies_loaded, user_changes_preserved]
outputs: [owner_assignment, workflow_plan, validation_summary, human_decision_package]
evidence: [files_inspected, assumptions, unavailable_context, approval_requirements]
tools: [tools/project-read.yaml, tools/static-discovery.yaml]
permissions: {filesystem: read_only, shell: approval_required_read_only, external_integrations: disabled}
dependencies: [policies/permissions.yaml, policies/security.yaml, policies/evidence-handling.yaml]
delegation:
  governance_policy_frameworks: subagents/governance-policy-frameworks-agent.yaml
  risk_exceptions_remediation: subagents/cyber-risk-exceptions-agent.yaml
  assurance_evidence_remediation: subagents/assurance-evidence-remediation-agent.yaml
  third_party_maturity_reporting: subagents/third-party-maturity-reporting-agent.yaml
  final_review: subagents/independent-assurance-reviewer.yaml
stop_conditions: [out_of_scope_request, approval_required, protected_material_risk, external_action_requested]
completion_criteria: [single_owner_assigned, evidence_status_reported, independent_review_completed_or_required]
human_review: required_for_formal_approval_or_external_use
prohibited_actions: [accept_risk, certify_compliance, submit_filings, activate_integrations, self_review]
