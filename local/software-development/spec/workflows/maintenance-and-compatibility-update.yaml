schema_version: '1.0'
id: maintenance-and-compatibility-update
name: Maintenance and Compatibility Update
purpose: Perform bounded maintenance while preserving supported environments and contracts.
risk_triggers:
- runtime compatibility
- toolchain change
- platform support change
stages:
- intake
- requirements
- analysis
- risk_classification
- design_if_applicable
- plan
- human_checkpoint
- implementation_if_applicable
- validation
- independent_code_review
- engineering_risk_review_if_triggered
- documentation
- release_readiness
- close
completion_requires:
- traceability
- validation_evidence_or_not_run
- independent_review
- documented_risks
- human_release_decision
