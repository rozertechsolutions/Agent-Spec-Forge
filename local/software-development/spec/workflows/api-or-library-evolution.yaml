schema_version: '1.0'
id: api-or-library-evolution
name: API or Library Evolution
purpose: Evolve public contracts with compatibility, versioning, migration, testing,
  and documentation controls.
risk_triggers:
- breaking change
- external consumers
- semantic versioning impact
- deprecation
stages:
- intake
- requirements
- analysis
- risk_classification
- design_if_applicable
- plan
- human_checkpoint
- implementation_if_applicable
- validation
- independent_code_review
- engineering_risk_review_if_triggered
- documentation
- release_readiness
- close
completion_requires:
- traceability
- validation_evidence_or_not_run
- independent_review
- documented_risks
- human_release_decision
