schema_version: '1.0'
id: security-remediation
name: Security Remediation
purpose: Correct a verified software weakness without exposing sensitive details or
  creating regressions.
risk_triggers:
- credential exposure
- authorization
- injection
- unsafe deserialization
- sensitive data
stages:
- intake
- requirements
- analysis
- risk_classification
- design_if_applicable
- plan
- human_checkpoint
- implementation_if_applicable
- validation
- independent_code_review
- engineering_risk_review_if_triggered
- documentation
- release_readiness
- close
completion_requires:
- traceability
- validation_evidence_or_not_run
- independent_review
- documented_risks
- human_release_decision
