schema_version: '1.0'
id: architecture-change
name: Architecture Change
purpose: Evaluate alternatives, document a decision, obtain approval, migrate safely,
  and review independently.
risk_triggers:
- boundary change
- new architectural pattern
- migration
- compatibility risk
stages:
- intake
- requirements
- analysis
- risk_classification
- design_if_applicable
- plan
- human_checkpoint
- implementation_if_applicable
- validation
- independent_code_review
- engineering_risk_review_if_triggered
- documentation
- release_readiness
- close
completion_requires:
- traceability
- validation_evidence_or_not_run
- independent_review
- documented_risks
- human_release_decision
