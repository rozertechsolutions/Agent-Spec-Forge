schema_version: '1.0'
id: release-readiness-review
name: Release-Readiness Review
purpose: Aggregate evidence, reviews, documentation, migrations, and risks for a human
  release decision.
risk_triggers:
- missing evidence
- known critical issue
- unreviewed change
- incomplete documentation
stages:
- intake
- requirements
- analysis
- risk_classification
- design_if_applicable
- plan
- human_checkpoint
- implementation_if_applicable
- validation
- independent_code_review
- engineering_risk_review_if_triggered
- documentation
- release_readiness
- close
completion_requires:
- traceability
- validation_evidence_or_not_run
- independent_review
- documented_risks
- human_release_decision
