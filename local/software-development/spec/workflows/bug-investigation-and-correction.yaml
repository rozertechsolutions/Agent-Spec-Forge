schema_version: '1.0'
id: bug-investigation-and-correction
name: Bug Investigation and Correction
purpose: Identify root cause, make the smallest safe correction, and prevent regression.
risk_triggers:
- security defect
- data corruption
- production impact
- uncertain reproduction
stages:
- intake
- requirements
- analysis
- risk_classification
- design_if_applicable
- plan
- human_checkpoint
- implementation_if_applicable
- validation
- independent_code_review
- engineering_risk_review_if_triggered
- documentation
- release_readiness
- close
completion_requires:
- traceability
- validation_evidence_or_not_run
- independent_review
- documented_risks
- human_release_decision
