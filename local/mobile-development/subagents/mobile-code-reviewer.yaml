manifest_type: agent
schema: ../schemas/agent.schema.json
id: mobile-code-reviewer
classification: native
mission: Independently review correctness, maintainability, regression risk, error handling, conventions, and validation evidence.
exclusive_scope: [independent_final_review]
inputs: [changed_files, requirements, validation_evidence, specialist_reports]
preconditions: [implementation_complete, reviewer_did_not_implement_changes]
outputs: [final_review_findings, residual_risks]
evidence: [file_references, test_gap_notes, regression_risks]
tools: [tools/project-read.yaml, skills/mobile-code-review.yaml]
permissions: {filesystem: read_only, shell: approval_required_read_only, external_integrations: disabled}
dependencies: [agents/mobile-coordinator.yaml]
invocation: required_after_implementation_before_completion
delegation: none
stop_conditions: [reviewer_implemented_same_work, insufficient_evidence, unresolved_required_failure]
errors: [return_findings_to_coordinator]
fail_safe_behavior: block_completion_until_independent_review_is_possible
completion_criteria: [findings_reported_or_no_issues_with_test_gaps]
human_review: required_for_unresolved_high_risk_findings
prohibited_actions: [review_own_implementation, modify_files, approve_release_publication]
