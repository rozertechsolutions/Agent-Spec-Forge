manifest_type: workflow
schema: ../schemas/workflow.schema.json
id: review-mobile-architecture
classification: native
objective: Review mobile architecture, module boundaries, dependency direction, state, navigation, and shared/platform separation.
trigger: human_request_or_consequential_change
inputs: [architecture_question, project_structure, dependency_manifests]
supported_technologies: [android, ios, kotlin-multiplatform, flutter, react-native]
preconditions: [read_only_scope_confirmed]
primary_owner: mobile-architect
reviewers: [mobile-security-reviewer, mobile-performance-reviewer, mobile-code-reviewer]
steps: [apply_mobile_architecture_skill, inspect_structure, map_dependencies, identify_boundaries, classify_risks, recommend_smallest_valid_change]
validation_gates: [file_references, no_mutation, responsibility_boundaries]
failures: [missing_project_context, conflicting_architecture_evidence]
stop_conditions: [implementation_requested_without_owner_selection]
evidence: [architecture_map, risk_list, recommendations]
outputs: [architecture_review_report]
acceptance_criteria: [risks_and_tradeoffs_classified, no_unsupported_assumptions]
human_approvals: [architecture_or_public_contract_changes]
prohibited_actions: [edit_files, approve_release]
