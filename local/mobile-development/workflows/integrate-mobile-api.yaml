manifest_type: workflow
schema: ../schemas/workflow.schema.json
id: integrate-mobile-api
classification: native
objective: Integrate a mobile API using existing networking, serialization, error, caching, offline, and security conventions.
trigger: human_request
inputs: [api_contract, auth_requirements, error_model, target_feature]
supported_technologies: [android, ios, kotlin-multiplatform, flutter, react-native]
preconditions: [api_contract_available, no_real_secret_in_repo, owner_selected]
primary_owner: coordinator_selected_platform_engineer
reviewers: [mobile-security-reviewer, mobile-test-engineer, mobile-code-reviewer]
steps: [inspect_networking_patterns, validate_contract, implement_client_boundary, handle_errors_and_cancellation, add_tests, review_security, apply_mobile_code_review_skill]
validation_gates: [auth_review, network_failure_states, offline_or_cache_policy, tests]
failures: [missing_api_contract, credentials_required, private_endpoint_requested]
stop_conditions: [production_write_needed, auth_or_privacy_change_without_human_review]
evidence: [contract_references, tests, security_findings]
outputs: [api_integration, validation_report]
acceptance_criteria: [contract_followed, failures_handled, no_secret_committed]
human_approvals: [auth, privacy, telemetry, external_writes, dependency_changes]
prohibited_actions: [embed_secrets, use_real_credentials, silent_cloud_fallback]
