manifest_type: workflow
schema: ../schemas/workflow.schema.json
id: optimize-mobile-performance
classification: native
objective: Improve or assess mobile performance only with measurable baselines, scoped changes, and repeatable evidence.
trigger: human_request_or_performance_regression
inputs: [performance_issue, target_metric, measurement_environment]
supported_technologies: [android, ios, kotlin-multiplatform, flutter, react-native]
preconditions: [metric_defined, measurement_method_available_or_blocker_reported]
primary_owner: coordinator_selected_platform_engineer
reviewers: [mobile-performance-reviewer, mobile-code-reviewer]
steps: [define_metric, collect_baseline_when_available, implement_scoped_change, remeasure, compare_results, review_regression_risk, apply_mobile_code_review_skill]
validation_gates: [baseline_or_blocker, post_change_measurement_or_blocker, no_unrelated_regression]
failures: [measurement_unavailable, noisy_results, destructive_device_operation_required]
stop_conditions: [claim_without_measurement, battery_or_background_tradeoff_without_review]
evidence: [baseline, post_change_measurement, methodology]
outputs: [performance_change_or_review, measurement_report]
acceptance_criteria: [improvement_claim_supported_or_reported_unavailable]
human_approvals: [resource_intensive_measurement, background_behavior_changes]
prohibited_actions: [claim_improvement_without_measurement, use_production_data]
