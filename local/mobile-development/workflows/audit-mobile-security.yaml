manifest_type: workflow
schema: ../schemas/workflow.schema.json
id: audit-mobile-security
classification: native
objective: Perform read-only mobile security and privacy review with findings, risk levels, and required human decisions.
trigger: human_request_or_sensitive_change
inputs: [audit_scope, changed_files, dependency_files, manifests]
supported_technologies: [android, ios, kotlin-multiplatform, flutter, react-native]
preconditions: [read_only_scope_confirmed]
primary_owner: mobile-security-reviewer
reviewers: [mobile-code-reviewer]
steps: [inspect_scope, review_secrets_and_protected_files, review_auth_storage_transport_permissions, classify_findings, apply_mobile_code_review_skill, report_human_reviews]
validation_gates: [no_mutation, findings_have_file_references, secret_handling_policy_applied]
failures: [secret_detected, missing_sensitive_file_authorization]
stop_conditions: [credential_access_requested, production_system_access_requested]
evidence: [findings, policy_references, unavailable_notes]
outputs: [security_audit_report]
acceptance_criteria: [risks_classified, no_sensitive_data_exposed]
human_approvals: [any_sensitive_change_or_credential_access]
prohibited_actions: [modify_files_by_default, expose_secrets, approve_sensitive_change]
