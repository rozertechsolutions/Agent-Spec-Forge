manifest_type: workflow
schema: ../schemas/workflow.schema.json
id: implement-mobile-feature
classification: native
objective: Implement a mobile feature within the detected project architecture and platform ownership boundaries.
trigger: human_request
inputs: [feature_requirements, acceptance_criteria, target_project]
supported_technologies: [android, ios, kotlin-multiplatform, flutter, react-native]
preconditions: [project_inspected, owner_selected, acceptance_criteria_clear]
primary_owner: coordinator_selected_platform_engineer
reviewers: [mobile-test-engineer, mobile-security-reviewer, mobile-ui-accessibility-reviewer, mobile-code-reviewer]
steps: [inspect_context, partition_units, implement_smallest_complete_change, add_or_update_tests, run_targeted_checks, apply_mobile_code_review_skill, run_independent_review]
validation_gates: [requirements_traceability, compilation_when_available, tests_when_available, security_review, accessibility_review_for_ui]
failures: [ambiguous_behavior, conflicting_changes, unavailable_required_tooling]
stop_conditions: [public_contract_change_without_approval, credentials_required, unsupported_capability]
evidence: [diff_summary, test_results, reviewer_findings]
outputs: [feature_changes, validation_report]
acceptance_criteria: [feature_behavior_met, required_checks_pass_or_blocked_with_reason]
human_approvals: [dependencies, permissions, auth, privacy, telemetry, external_writes]
prohibited_actions: [self_final_review, fabricate_success, sign_publish_upload_deploy]
