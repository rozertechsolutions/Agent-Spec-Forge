provider:
  type: openai-compatible
  baseUrl: http://127.0.0.1:1234/v1
  apiKeyEnvironmentVariable: LOCAL_AI_API_KEY
  requestTimeoutSeconds: 120
model:
  id: local-model
  temperature: 0.2
  maxOutputTokens: 8192
permissions:
  network: false
  filesystemWrite: false
  externalWrite: false
mcpServers: []
