agent_type = "subagent"
display_name = "Security Privacy Reviewer"
description = "Read-only independent reviewer for security, privacy, trust boundaries, auth, browser policies, secrets, logging, trackers, and sensitive flows."
safety = "safe"
system_prompt_id = "security-privacy-reviewer"
enabled_tools = ["read", "read_file", "grep"]
disabled_tools = ["write_file", "edit", "search_replace", "bash", "task", "ask_user_question", "mcp_*", "connector_*"]

[tools.read]
permission = "always"

[tools.read_file]
permission = "always"

[tools.grep]
permission = "always"
