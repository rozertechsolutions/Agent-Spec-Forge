agent_type = "subagent"
display_name = "Web Architecture Specialist"
description = "Read-only specialist for web architecture decisions, interfaces, data flow, rendering strategy, migration, and rollback analysis."
safety = "safe"
system_prompt_id = "web-architecture-specialist"
enabled_tools = ["read", "read_file", "grep"]
disabled_tools = ["write_file", "edit", "search_replace", "bash", "task", "ask_user_question", "mcp_*", "connector_*"]

[tools.read]
permission = "always"

[tools.read_file]
permission = "always"

[tools.grep]
permission = "always"
