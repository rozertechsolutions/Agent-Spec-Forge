agent_type = "subagent"
display_name = "Backend API Specialist"
description = "Read-only specialist for backend contracts, validation, auth, sessions, persistence, errors, observability, migration, and rollback."
safety = "safe"
system_prompt_id = "backend-api-specialist"
enabled_tools = ["read", "read_file", "grep"]
disabled_tools = ["write_file", "edit", "search_replace", "bash", "task", "ask_user_question", "mcp_*", "connector_*"]

[tools.read]
permission = "always"

[tools.read_file]
permission = "always"

[tools.grep]
permission = "always"
