agent_type = "subagent"
display_name = "Frontend Specialist"
description = "Read-only specialist for frontend semantics, state, responsive behavior, forms, browser APIs, and user-facing failure states."
safety = "safe"
system_prompt_id = "frontend-specialist"
enabled_tools = ["read", "read_file", "grep"]
disabled_tools = ["write_file", "edit", "search_replace", "bash", "task", "ask_user_question", "mcp_*", "connector_*"]

[tools.read]
permission = "always"

[tools.read_file]
permission = "always"

[tools.grep]
permission = "always"
