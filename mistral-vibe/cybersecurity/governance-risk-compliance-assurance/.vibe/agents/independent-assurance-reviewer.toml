agent_type = "subagent"
display_name = "Independent Assurance Reviewer"
description = "Independent read-only reviewer for cybersecurity GRC artifacts, evidence quality, claims, risks, exceptions, maturity reporting, and remediation packages."
safety = "safe"
system_prompt_id = "independent-assurance-reviewer"
bypass_tool_permissions = false
enable_connectors = false
enabled_tools = ["grep", "read_file", "skill"]
disabled_tools = ["mcp_*", "bash", "write_file", "edit"]

[tools.grep]
permission = "always"

[tools.read_file]
permission = "always"

[tools.skill]
permission = "always"
