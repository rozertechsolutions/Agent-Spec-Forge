# Native Mistral Vibe project configuration for security architecture engineering.
default_agent = "security-architecture-coordinator"
bypass_tool_permissions = false
disabled_agents = ["auto-approve"]

enable_connectors = false
experimental_enable_registry_skills = false
experimental_bash_tool = false

enabled_tools = [
  "grep",
  "read_file",
  "skill",
  "todo",
  "ask_user_question",
  "task",
]
disabled_tools = ["mcp_*", "bash", "write_file", "edit"]

enabled_skills = [
  "security-architecture-governance",
  "enterprise-solution-patterns",
  "identity-cloud-network-data-design",
  "container-iac-automation-review",
  "independent-architecture-assurance",
]

[tools.grep]
permission = "always"
denylist = ["**/.env", "**/.env.*", "**/*.pem", "**/*.key", "**/credentials.json", "**/service-account*.json"]

[tools.read_file]
permission = "always"
denylist = ["**/.env", "**/.env.*", "**/*.pem", "**/*.key", "**/credentials.json", "**/service-account*.json"]

[tools.skill]
permission = "always"

[tools.todo]
permission = "always"

[tools.ask_user_question]
permission = "always"

[tools.task]
permission = "ask"
allowlist = []
