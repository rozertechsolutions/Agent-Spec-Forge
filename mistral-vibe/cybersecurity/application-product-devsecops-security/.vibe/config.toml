# Native Mistral Vibe project configuration for application product DevSecOps security.
default_agent = "application-product-devsecops-security-coordinator"
bypass_tool_permissions = false
disabled_agents = ["auto-approve"]

enable_connectors = false
experimental_enable_registry_skills = false
experimental_bash_tool = false

enabled_tools = [
  "grep",
  "read_file",
  "skill",
  "todo",
  "ask_user_question",
  "task",
]
disabled_tools = ["mcp_*", "bash", "write_file", "edit"]

enabled_skills = [
  "sdlc-requirements-threat-modeling",
  "secure-design-code-review",
  "supply-chain-ci-release-assurance",
  "testing-findings-psirt-coordination",
  "independent-appsec-assurance",
]

[tools.grep]
permission = "always"
denylist = ["**/.env", "**/.env.*", "**/*.pem", "**/*.key", "**/credentials.json", "**/service-account*.json"]

[tools.read_file]
permission = "always"
denylist = ["**/.env", "**/.env.*", "**/*.pem", "**/*.key", "**/credentials.json", "**/service-account*.json"]

[tools.skill]
permission = "always"

[tools.todo]
permission = "always"

[tools.ask_user_question]
permission = "always"

[tools.task]
permission = "ask"
allowlist = []
